<rect x="40" y="726" width="1520" height="150" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.4"/>
<text x="65" y="753" class="section">读图说明</text>
<text x="65" y="777" class="txt">主图以文件级模块展示 lib 目录 import 关系。所有依赖均为硬依赖（Dart import）。</text>
<text x="65" y="801" class="txt">主要高扇出模块：app.dart(6)、main.dart(4)、prompt_detail_screen.dart(4)、prompt_list_screen.dart(3)。它们是架构上最容易形成耦合的编排入口。</text>
<text x="65" y="825" class="txt">主要基础模块：prompt_provider.dart(5)、models(5)、auth_provider.dart(4)、copy_history_service.dart(2)。上层应依赖它们，反向依赖应避免。</text>
<text x="65" y="849" class="txt">读图方向：箭头 A → B 表示 A 依赖 B。页面经 Provider 访问仓储，部分页面直接调用 Service。</text>
</svg>
